{{ if ne (.Params.showMeta | default true) false }}
<div class="post-meta">
	{{ if eq .Kind "page" }}
	<div class="post-meta-item post-tag">
		# {{ $tags := .GetTerms "tags" }} {{ $len := len $tags }} {{ range $index,
		$tag := $tags }}
		<a href="{{ .Permalink }}">{{ $tag.LinkTitle }}</a>
		{{ if lt (add $index 1) $len }}, {{ end }} {{ end }}
	</div>
	{{ end }}
</div>
{{ end }}
