{{ $hasHeadings := false }}
{{ if .RawContent }}
  {{/* 正则匹配：查找以 1 到 6 个 # 开头的行 */}}
  {{ $headings := findRE "(?m)^#{1,6} " .RawContent }}
  {{ if gt (len $headings) 0 }}
    {{ $hasHeadings = true }}
  {{ end }}
{{ end }}

{{ if $hasHeadings }}
<aside id="ms_toc_container">
    <div id="ms_toc">
        <strong>Table Of Contents</strong>
        <nav class="toc-nav">
            {{ .TableOfContents }}
        </nav>
    </div>
</aside>
{{ end }}
